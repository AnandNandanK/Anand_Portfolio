name: Build & Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  build-and-deploy:
    runs-on: [self-hosted, Linux, X64]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build React App
        run: NODE_OPTIONS=--max_old_space_size=768 npm run build

      - name: Remove old deployed files
        run: rm -rf /var/www/apps/first-hosting-project/*

      - name: Deploy new build files
        run: cp -r dist/* /var/www/apps/first-hosting-project/
